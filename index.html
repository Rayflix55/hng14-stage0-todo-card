<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HNG Stage 0 - Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" id="main-card">
      <div class="top-row">
        <div class="badges-group">
          <span class="pill" data-testid="test-todo-tag-design">Design</span>
          <span class="pill" data-testid="test-todo-priority"
            >High Priority</span
          >
        </div>
        <div class="checkbox-container">
          <input
            type="checkbox"
            id="check"
            data-testid="test-todo-complete-toggle"
          />
          <label for="check" style="display: none">Complete</label>
        </div>
      </div>

      <h2 data-testid="test-todo-title" id="todo-title">
        Launch Social Media Campaign
      </h2>
      <p data-testid="test-todo-description">
        Prepare visuals and copy for the "30 Days of Productivity" campaign
        across Instagram, LinkedIn, and X.
      </p>

      <div class="meta-container">
        <svg class="clock-icon" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        <div class="time-labels">
          <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00"
            >Due at 12:00 AM, 16 Apr 2026</time
          >
          <span
            data-testid="test-todo-time-remaining"
            id="countdown"
            aria-live="polite"
            >Calculating...</span
          >
        </div>
      </div>

      <ul data-testid="test-todo-tags" role="list">
        <li class="tag-item" data-testid="test-todo-tag-work">WORK</li>
        <li class="tag-item" data-testid="test-todo-tag-urgent">URGENT</li>
        <li
          class="tag-item"
          data-testid="test-todo-status"
          id="status-chip"
          style="color: var(--primary)"
        >
          IN PROGRESS
        </li>
      </ul>

      <div class="action-grid">
        <button
          class="btn-liquid"
          data-testid="test-todo-edit-button"
          onclick="console.log('edit clicked')"
        >
          Edit
        </button>
        <button
          class="btn-liquid"
          data-testid="test-todo-delete-button"
          onclick="alert('Delete clicked')"
        >
          Delete
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
